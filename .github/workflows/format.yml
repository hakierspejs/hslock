name: format

on:
  push:
  pull_request:

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        uses: jidicula/clang-format-action@v4.15.0
        with:
          clang-format-version: '19'
          # Only our own sources; vendored libs/ and the generated
          # version.h are left alone.
          exclude-regex: '(^|/)(libs|build)/|version\.h'
